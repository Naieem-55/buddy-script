services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buddy_script
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/buddy_script?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_at_least_32_chars_long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_at_least_32_chars_long}
      STORAGE_DRIVER: local
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
